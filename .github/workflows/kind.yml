name: KinD tests

on:
  push:
    branches:
      - main
      - release-[0-9]+.[0-9]+
  pull_request:
    branches:
      - main
      - release-[0-9]+.[0-9]+

defaults:
  run:
    shell: bash

jobs:
  preflight-tests:
    name: Preflight Tests
    runs-on: ubuntu-latest
    env:
      REGISTRY: localhost:5000
    steps:
    - name: Checkout Cert Policy Controller
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Format, Lint, and Generate
      run: |
        go mod verify
        make fmt
        git diff --exit-code
        make lint
        make generate
        make generate-operator-yaml
        git diff --exit-code

    - name: Unit Tests
      run: |
        make test-coverage

    - name: Upload Test Info
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: latest-preflight-tests
        path: |
          coverage_*.out
          report_*.xml

  kind-tests:
    runs-on: ubuntu-latest
    env:
      REGISTRY: localhost:5000
    strategy:
      fail-fast: false
      matrix:
        # Run tests on oldest and newest supported OCP Kubernetes
        # The "minimum" tag is set in the Makefile
        # KinD tags: https://hub.docker.com/r/kindest/node/tags
        kind:
          - 'minimum'
          - 'latest'
    name: KinD tests
    steps:
    - name: Checkout Cert Policy Controller
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Create K8s KinD Cluster - ${{ matrix.kind }}
      env:
        KIND_VERSION: ${{ matrix.kind }}
      run: |
        make kind-bootstrap-cluster-dev
        KUBECONFIG=${PWD}/kubeconfig_managed make kind-ensure-sa

    - name: E2E Tests
      run: |
        export GOPATH=$(go env GOPATH)
        KUBECONFIG=${PWD}/kubeconfig_managed make e2e-test-coverage

    - name: Create K8s KinD Cluster to simulate hosted mode - ${{ matrix.kind }}
      env:
        KIND_VERSION: ${{ matrix.kind }}
      run: |
        make kind-additional-cluster

    - name: E2E tests that simulate hosted mode
      run: |
        export GOPATH=$(go env GOPATH)
        KUBECONFIG=${PWD}/kubeconfig_managed make e2e-test-hosted-mode-coverage

    - name: Upload Test Info
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: "${{matrix.kind}}-kind-tests"
        path: |
          coverage_*.out
          report_*.xml

    - name: Debug
      if: ${{ failure() }}
      run: |
        make e2e-debug

    - name: Clean up cluster
      if: ${{ always() }}
      run: |
        make kind-delete-cluster

  coverage-verification:
    needs: [preflight-tests, kind-tests]
    defaults:
      run:
        working-directory: '.'
    name: Test Coverage Verification
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Cert Policy Controller
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Download Test Results
      uses: actions/download-artifact@v8
      with:
        merge-multiple: true
        pattern: latest-*

    - name: Test Coverage Verification
      run: |
        make coverage-verify
        make gosec-scan

    - name: Store the GitHub triggering event for the sonarcloud workflow
      env:
        EVENT_JSON: ${{ toJSON(github.event) }}
      if: |
        github.repository_owner == 'stolostron'
      run: |
          printf '%s' "${EVENT_JSON}" > event.json

    - name: Upload artifacts for the sonarcloud workflow
      if: |
        github.repository_owner == 'stolostron'
      uses: actions/upload-artifact@v7
      with:
        name: artifacts
        path: |
          coverage*.out
          event.json
          gosec.json

    - name: Report unit coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        files: ./coverage_unit.out
        flags: unit-tests
        name: unit-tests
        fail_ci_if_error: false
        disable_search: true

    - name: Report e2e coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        files: ./coverage_e2e.out
        flags: e2e-tests
        name: e2e-tests
        fail_ci_if_error: false
        disable_search: true

    - name: Report overall coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
        fail_ci_if_error: false
